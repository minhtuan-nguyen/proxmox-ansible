---
- name: preparation tasks
  hosts: proxmox_nodes
  tasks:
    - name: set NTP servers
      ansible.builtin.include_role:
        name: 02_timezone
    - name: check if resolv.conf file exists 
      stat:
        path: /etc/resolv.conf
      register: file_info
    - name: Create /etc/resolv.conf if it exists
      file:
        path: /etc/resolv.conf
        state: touch
      when: not file_info.stat.exists

    - name: Set DNS nameservers in /etc/resolv.conf
      blockinfile:
        path: /etc/resolv.conf
        block: |
          search "{{ search_domain }}"
          nameserver "{{ dns_1 }}"
          nameserver "{{ dns_2 }}"
    - name: update to latest packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: true
        cache_valid_time: 86400 # One day
    - name: install necessary packages
      apt:
        name: 
        - sudo
        - python3-proxmoxer
        update_cache: yes
        cache_valid_time: 86400
        state: latest
    - name: create ansible user
      user:
        name: "{{ local_user }}"
        shell: "/bin/bash"
    - name: add ansible ssh key
      authorized_key:
        user: "{{ local_user }}"
        key: "{{ ssh_key }}"
    - name: add ansible to sudoers
      copy:
        src: sudoer_ansible
        dest: /etc/sudoers.d/ansible
        owner: root
        group: root
        mode: 0440
# Node 01 network configuration
- name: configure network interfaces
  hosts: proxmox-01
  tasks:
    - name: add bond0 interface
      community.proxmox.proxmox_node_network:
        node: "{{ proxmox_01_name }}"
        api_host: "{{ proxmox_01_api }}"
        api_user: "{{ api_user }}"
        api_token_secret: "{{ token_secret_01 }}"
        api_token_id: "{{ api_token_id }}"
        state: present
        iface: bond0
        iface_type: bond
        bond_mode: 802.3ad
        slaves: nic4 nic5
        bond_xmit_hash_policy: "layer3+4"
        mtu: 9000
    - name: add bond1 interface
      community.proxmox.proxmox_node_network:
        node: "{{ proxmox_01_name }}"
        api_host: "{{ proxmox_01_api }}"
        api_user: "{{ api_user }}"
        api_token_secret: "{{ token_secret_01 }}"
        api_token_id: "{{ api_token_id }}"
        state: present
        iface: bond1
        iface_type: bond
        bond_mode: 802.3ad
        slaves: nic6 nic7
        bond_xmit_hash_policy: "layer3+4"
        mtu: 9000
    - name: add vmbr0 interface
      community.proxmox.proxmox_node_network:
        node: "{{ proxmox_01_name }}"
        api_host: "{{ proxmox_01_api }}"
        api_user: "{{ api_user }}"
        api_token_secret: "{{ token_secret_01 }}"
        api_token_id: "{{ api_token_id }}"
        state: present
        iface: vmbr0
        iface_type: bridge
        bridge_ports: bond0
        cidr: "{{ proxmox_01_vmbr0 }}"
        gateway: "{{ network_gateway }}"
        mtu: 9000
    - name: add vmbr1 interface
      community.proxmox.proxmox_node_network:
        node: "{{ proxmox_01_name }}"
        api_host: "{{ proxmox_01_api }}"
        api_user: "{{ api_user }}"
        api_token_secret: "{{ token_secret_01 }}"
        api_token_id: "{{ api_token_id }}"
        state: present
        iface: vmbr1
        iface_type: bridge
        bridge_ports: bond1
        cidr: "{{ proxmox_01_vmbr1 }}"
        mtu: 9000
    - name: apply network changes
      community.proxmox.proxmox_node_network:
        node: "{{ proxmox_01_name }}"
        api_host: "{{ proxmox_01_api }}"
        api_user: "{{ api_user }}"
        api_token_secret: "{{ token_secret_01 }}"
        api_token_id: "{{ api_token_id }}"
        state: apply
