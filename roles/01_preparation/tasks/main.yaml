- name: Extract Proxmox major version
  ansible.builtin.set_fact:
    proxmox_pve_major:
      "{{ proxmox_pveversion_info.stdout.split('/')[1].split('.')[0] | int if \
      proxmox_pveversion_info.stdout is defined and proxmox_pveversion_info.stdout.split('/') | length > 1  else 9 }}"

- name: Remove unnecessary repository files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list
    - /etc/apt/sources.list.d/pve-enterprise.list
    - /etc/apt/sources.list.d/ceph.list
    - /etc/apt/sources.list.d/pve-enterprise.sources
    - /etc/apt/sources.list.d/ceph.sources
    - /etc/apt/sources.list.d/debian.sources

- name: Configure APT repositories
  block:
    - name: Add Proxmox and Debian repositories
      ansible.builtin.template:
        src: sources.list.j2
        dest: /etc/apt/sources.list.d/pve-sources.list
        mode: '0644'
      register: add_proxmox_repo_result

    
    - name: SourceListWarnings NonFreeFirmware
      ansible.builtin.lineinfile:
        path: /etc/apt/apt.conf.d/no-{{ ansible_distribution_release }}-firmware.conf
        line: 'APT::Get::Update::SourceListWarnings::NonFreeFirmware "false";'
        create: true
        state: present
        mode: '0644'

    - name: Disable Proxmox subscription popup
      ansible.builtin.replace:
        path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
        regexp: '^(.*)Ext\.Msg\.show\(\{(.*)$\n^(.*)No valid subscription(.*)$'
        replace: '\1void({\2\n\3No valid subscription\4'

- name: Disable proxmox subscription popup
  ansible.builtin.replace:
    path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
    regexp: '^(.*)Ext\.Msg\.show\(\{(.*)$\n^(.*)No valid subscription(.*)$'
    replace: '\1void({\2\n\3No valid subscription\4'

- name: Disable subscription nag
  ansible.builtin.copy:
    src: no-nag-script
    dest: /etc/apt/apt.conf.d/no-nag-script
    mode: '0644'

- name: Clean APT cache if repositories were updated
  when: >
    add_proxmox_repo_result is changed 
  block:
    - name: Clean APT cache
      ansible.builtin.apt:
        autoclean: true

    - name: Remove APT lists directory
      ansible.builtin.file:
        path: /var/lib/apt/lists
        state: absent

    - name: Recreate APT lists directory
      ansible.builtin.file:
        path: /var/lib/apt/lists
        state: directory
        mode: '0755'
        owner: root
        group: root
        
- name: update to latest packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: true
    
- name: install necessary packages
  apt:
    name: 
    - python3-proxmoxer
    update_cache: yes
    cache_valid_time: 86400
    state: latest

- name: Create firewall rules at cluster level
  community.proxmox.proxmox_firewall:
    api_user: "{{ api_user }}"
    api_token_id: "{{ api_token_id }}"
    api_token_secret: "{{ api_token_secret }}"
    api_host: "{{ api_host }}"
    validate_certs: false
    level: cluster
    state: present
    rules:
      - type: in
        action: ACCEPT
        dport: 8006,8007,22,5900:5999,3128
        proto: tcp
        log: nolog
        pos: 9
        enable: true
      - type: in
        action: ACCEPT
        dport: 5404:5405
        proto: udp
        log: nolog
        pos: 10
        enable: true
      - type: in
        action: ACCEPT
        dport: 3366,3370:3371
        proto: tcp
        source: 10.49.172.0/24
        log: nolog
        pos: 11
        enable: true
      - type: in
        action: ACCEPT
        dport: 7000:7999
        proto: tcp
        source: 192.168.1.0/24
        log: nolog
        pos: 12
        enable: true
  when: inventory_hostname == "proxmox-01"
- name: enable firewall
  ansible.builtin.shell: systemctl enable pve-firewall.service

